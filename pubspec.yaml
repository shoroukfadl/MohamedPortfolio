name: portfolio
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Utilities
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  bloc:
  hydrated_bloc:
  equatable: 
  get_it: ^7.7.0
  universal_html: ^2.2.4
  shared_preferences: ^2.2.3
  google_fonts:
  go_router: ^14.2.0
  change_app_package_name: ^1.4.0
  simple_tooltip: ^1.2.0
  skeletonizer: ^1.1.0
  awesome_snackbar_content: ^0.1.3
  uuid: ^4.5.1
  url_strategy:
  url_launcher: ^6.3.1
  responsive_framework:
  json_annotation: 4.9.0
  dotted_border:
  supabase_flutter:
  flutter_svg: ^2.0.10
  flutter_launcher_icons: ^0.14.4
  intl:
  flutter_bloc:
  path_provider:
  flutter_dotenv:
  cached_network_image:


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable:
  build_runner:

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/Languages/
    - assets/icons/
  fonts:
    - family: portfolio
      fonts:
        - asset: assets/icons/portfolio.ttf

